# ~/.config/hypr/hypridle.conf
# Configuración de gestión de energía e inactividad para Hyprland

general {
    lock_cmd = pidof hyprlock || hyprlock       # comando para bloquear
    before_sleep_cmd = loginctl lock-session    # bloquear antes de suspender
    after_sleep_cmd = hyprctl dispatch dpms on  # encender pantalla al despertar
    ignore_dbus_inhibit = false                 # respetar inhibidores de aplicaciones
}

# Atenuar pantalla tras 5 minutos de inactividad
listener {
    timeout = 300                               # 5 min
    on-timeout = brightnessctl -s set 10%       # atenuar al 10%
    on-resume = brightnessctl -r                # restaurar brillo
}

# Bloquear pantalla tras 10 minutos
listener {
    timeout = 600                               # 10 min
    on-timeout = loginctl lock-session          # bloquear pantalla
}

# Apagar monitor tras 12 minutos
listener {
    timeout = 720                               # 12 min
    on-timeout = hyprctl dispatch dpms off      # apagar monitor
    on-resume = hyprctl dispatch dpms on        # encender al volver
}

# Suspender sistema tras 20 minutos
listener {
    timeout = 1200                              # 20 min
    on-timeout = systemctl suspend              # suspender el sistema
}
