# Alineación Estética: ROJO/NEGRO (The Arch Sentinel)

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

# FONDO: Rojo Oscuro Sólido para minimalismo y contraste.
# Si prefieres tu wallpaper borroso, comenta 'color' y descomenta 'path'/'blur'.
background {
    monitor =
    color = rgb(30, 0, 0) # Rojo Sangre Muy Oscuro
    # path = screenshot
    # blur_passes = 3
    # blur_size = 4
}

# CAMPO DE INPUT: Núcleo de la estética.
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(255, 0, 0)    # Borde: Rojo Puro Intenso
    inner_color = rgb(40, 0, 0)     # Fondo: Rojo Oscuro
    font_color = rgb(255, 150, 150) # Texto: Rojo Claro
    fade_on_empty = false
    placeholder_text = <span foreground="##ff3333"><i>SYSTEM LOCKED</i></span> # Placeholder Rojo
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
    check_color = rgb(255, 100, 0)  # Validando: Naranja/Rojo
    fail_color = rgb(255, 0, 0)     # Fallo: Rojo Puro
}

# RELOJ: Grande, Rojo Intenso.
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(255, 0, 0)
    font_size = 95
    font_family = JetBrains Mono ExtraBold
    position = 0, 100
    halign = center
    valign = center
}

# FECHA: Rojo secundario.
label {
    monitor =
    text = cmd[update:10000] echo "$(date +"%A, %d %B %Y")"
    color = rgb(200, 60, 60)
    font_size = 18
    font_family = JetBrains Mono Bold
    position = 0, 30
    halign = center
    valign = center
}

# IDENTIDAD: Tu usuario en rojo.
label {
    monitor =
    text = $USER
    color = rgb(255, 0, 0)
    font_size = 16
    font_family = JetBrains Mono
    position = 0, -120
    halign = center
    valign = center
}

# INDICADOR DE ESTADO: Opcional - muestra logo de Arch
label {
    monitor =
    text =  # Logo de Arch
    color = rgb(255, 0, 0)
    font_size = 40
    font_family = JetBrains Mono Nerd Font
    position = 0, 220
    halign = center
    valign = center
}
